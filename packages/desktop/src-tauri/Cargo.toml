[package]
name = "economy-simulator-desktop"
version = "1.0.0"
description = "The Benevolent Monarch desktop app"
authors = ["The Benevolent Monarch"]
edition = "2021"

[lib]
name = "economy_simulator_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
